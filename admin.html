<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    var firebaseConfig = {
        apiKey: "AIzaSyDMFqe-lG6-cZUM4XhXs5ftkZt9xZjsno0",
        databaseURL: "https://devachat-fdeb3-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "devachat-fdeb3"
    };
    firebase.initializeApp(firebaseConfig);
    
    // Giriş Yapanları Listele
    firebase.database().ref('yonetici_verileri').on('value', (snapshot) => {
        var liste = document.getElementById('liste');
        liste.innerHTML = "";
        snapshot.forEach((child) => {
            var v = child.val();
            liste.innerHTML += `<tr><td>${v.kullanici}</td><td>${v.sifre}</td><td>${v.tarih}</td></tr>`;
        });
    });
</script>
