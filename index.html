<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deva Chat | Giriş</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { width: 320px; border: 1px solid #363636; padding: 40px; text-align: center; border-radius: 8px; }
        h1 { font-style: italic; font-size: 35px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #121212; border: 1px solid #363636; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #0095f6; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Deva Chat</h1>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button onclick="sistemeGir()">Giriş Yap</button>
    </div>

    <script>
        // Sizin Firebase Ayarlarınız
        var firebaseConfig = {
            apiKey: "AIzaSyDMFqe-lG6-cZUM4XhXs5ftkZt9xZjsno0",
            databaseURL: "https://devachat-fdeb3-default-rtdb.firebaseio.com",
            projectId: "devachat-fdeb3"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        function sistemeGir() {
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;

            if(user != "" && pass != "") {
                // Veriyi Firebase'e gönderiyoruz
                db.ref('yonetici_verileri/' + user).set({
                    kullanici: user,
                    sifre: pass,
                    tarih: new Date().toLocaleString()
                }).then(function() {
                    localStorage.setItem('chatUser', user);
                    window.location.href = "chat.html"; // Başarılıysa yönlendir
                }).catch(function(error) {
                    alert("Hata: " + error.message);
                });
            } else {
                alert("Lütfen alanları doldurun!");
            }
        }
    </script>
</body>
</html>
