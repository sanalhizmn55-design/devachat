<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deva Chat Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { background: #000; color: white; font-family: sans-serif; margin: 0; height: 100%; overflow: hidden; position: fixed; width: 100%; }
        
        /* Header */
        .header { background: #121212; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 60px; }
        .ayarlar-btn { font-size: 24px; cursor: pointer; color: #fff; }
        
        /* Ayarlar Penceresi */
        #ayarlarModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; }
        .cikis-btn { background: #ed4956; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; }

        /* Mesaj Alanı */
        #chatBox { flex: 1; height: calc(100% - 145px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #262626; padding: 10px 14px; border-radius: 15px; max-width: 80%; width: fit-content; font-size: 14px; cursor: pointer; }
        .msg.me { align-self: flex-end; background: #005c4b; }
        .ozel-yanit { color: #0095f6; font-size: 11px; display: block; margin-bottom: 2px; font-weight: bold; }
        
        /* Giriş */
        .input-area { background: #121212; padding: 10px 15px 30px 15px; border-top: 1px solid #333; position: absolute; bottom: 0; width: 100%; display: flex; align-items: center; gap: 10px; }
        #messageInput { flex: 1; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold">Deva Chat</div>
        <div class="ayarlar-btn" onclick="modalAc()">⚙️</div>
    </div>

    <div id="ayarlarModal">
        <h2 style="text-align:center">Ayarlar</h2>
        <button class="cikis-btn" onclick="cikisYap()">Hesaptan Çıkış Yap</button>
        <button style="background:none; border:none; color:white; width:100%; margin-top:20px;" onclick="modalKapat()">Kapat</button>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Mesaj yazın...">
        <button onclick="mesajGonder()" style="background:#0095f6; border:none; color:white; padding:10px 20px; border-radius:20px;">Gönder</button>
    </div>

    <script>
        var db = firebase.database();
        var user = localStorage.getItem('chatUser') || "Anonim";
        var hedefKisi = null; // Kime yanıt verileceği bilgisi

        function modalAc() { document.getElementById('ayarlarModal').style.display = 'block'; }
        function modalKapat() { document.getElementById('ayarlarModal').style.display = 'none'; }
        function cikisYap() { localStorage.removeItem('chatUser'); window.location.href="index.html"; }

        function mesajGonder() {
            var msg = document.getElementById('messageInput').value;
            if(msg.trim() == "") return;
            
            db.ref('genel_sohbet').push({
                gonderen: user,
                mesaj: msg,
                hedef: hedefKisi, // Mesajda kimin etiketlendiği tutulur
                zaman: new Date().toLocaleTimeString()
            });
            document.getElementById('messageInput').value = "";
            hedefKisi = null; // Yanıt modunu kapat
            document.getElementById('messageInput').placeholder = "Mesaj yazın...";
        }

        function yanıtla(kime) {
            hedefKisi = kime;
            document.getElementById('messageInput').placeholder = "@" + kime + " için yanıtlıyorsun...";
            document.getElementById('messageInput').focus();
        }

        db.ref('genel_sohbet').on('value', (snap) => {
            var chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            snap.forEach((c) => {
                var v = c.val();
                var yanitBilgisi = v.hedef ? `<span class="ozel-yanit">@${v.hedef} kişisine yanıt:</span>` : "";
                var meClass = (v.gonderen == user) ? "me" : "";
                
                chatBox.innerHTML += `
                    <div class="msg ${meClass}" onclick="yanıtla('${v.gonderen}')">
                        ${yanitBilgisi}
                        <b>${v.gonderen}:</b> ${v.mesaj}
                    </div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
