<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deva Chat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* Mobil Cihazlar İçin Tam Sabitleme */
        * { box-sizing: border-box; }
        html, body { 
            background: #000; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            position: fixed; 
        }

        /* Üst Menü */
        .header { 
            background: #121212; 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #363636;
            height: 60px;
        }
        .profile-info { color: #0095f6; font-weight: bold; font-size: 16px; }
        .logout-btn { background: #ed4956; border: none; color: white; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }

        /* Mesaj Alanı */
        #chatBox { 
            height: calc(100% - 130px); /* Üst ve alt alan çıktıktan sonra kalan yer */
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            -webkit-overflow-scrolling: touch; /* iOS için akıcı kaydırma */
        }

        .msg { 
            background: #262626; 
            padding: 10px 14px; 
            border-radius: 18px; 
            max-width: 85%; 
            width: fit-content; 
            position: relative; 
            word-wrap: break-word;
            border-bottom-left-radius: 2px;
            font-size: 15px;
            line-height: 1.4;
        }
        .msg.me { align-self: flex-end; background: #005c4b; border-bottom-left-radius: 18px; border-bottom-right-radius: 2px; }
        .msg b { font-size: 12px; color: #0095f6; display: block; margin-bottom: 4px; }
        .msg.me b { color: #53bdeb; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }
        
        /* Yanıt ve Silme */
        .replied-part { background: rgba(0,0,0,0.3); border-left: 3px solid #0095f6; padding: 6px; margin-bottom: 6px; font-size: 12px; border-radius: 4px; color: #bbb; }
        .delete-btn { background: none; border: none; color: #ff4d4d; font-size: 11px; margin-top: 6px; padding: 0; text-decoration: underline; cursor: pointer; }

        /* Yanıt Paneli */
        #replyPreview { background: #1e1e1e; padding: 10px 15px; display: none; justify-content: space-between; border-left: 4px solid #0095f6; align-items: center; position: absolute; bottom: 70px; width: 100%; z-index: 10; }

        /* Giriş Alanı */
        .input-area { 
            background: #121212; 
            padding: 10px; 
            border-top: 1px solid #363636; 
            height: 70px;
            display: flex;
            align-items: center;
        }
        .input-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        #messageInput { flex: 1; padding: 12px 18px; background: #000; border: 1px solid #363636; color: white; border-radius: 25px; outline: none; font-size: 15px; }
        .file-label { font-size: 26px; cursor: pointer; color: #0095f6; padding: 0 5px; }
        .send-btn { background: #0095f6; border: none; color: white; padding: 10px 18px; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-info">
            <span id="userNameDisplay">Yükleniyor...</span>
        </div>
        <button class="logout-btn" onclick="cikisYap()">Çıkış</button>
    </div>

    <div id="chatBox"></div>

    <div id="replyPreview">
        <div style="overflow: hidden;">
            <b id="replyUser" style="color:#0095f6; font-size:12px;"></b>
            <p id="replyText" style="margin:2px 0; font-size:13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
        </div>
        <button onclick="yanitIptal()" style="background:none; border:none; color:#aaa; font-size:24px;">×</button>
    </div>

    <div class="input-area">
        <div class="input-row">
            <label class="file-label">
                + <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="fotoGonder()">
            </label>
            <input type="text" id="messageInput" placeholder="Mesaj yazın...">
            <button class="send-btn" onclick="mesajGonder()">Gönder</button>
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDMFqe-lG6-cZUM4XhXs5ftkZt9xZjsno0",
            databaseURL: "https://devachat-fdeb3-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "devachat-fdeb3"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        var user = localStorage.getItem('chatUser') || "Anonim";
        var replyData = null;

        document.getElementById('userNameDisplay').innerText = "Enes Bey | " + user;

        function mesajGonder() {
            var msg = document.getElementById('messageInput').value;
            if(msg.trim() != "" || replyData) {
                db.ref('genel_sohbet').push({
                    gonderen: user,
                    mesaj: msg,
                    yanit: replyData,
                    zaman: new Date().toLocaleTimeString()
                });
                document.getElementById('messageInput').value = "";
                yanitIptal();
            }
        }

        function fotoGonder() {
            var file = document.getElementById('imageInput').files[0];
            if(!file) return;
            var reader = new FileReader();
            reader.onloadend = function() {
                db.ref('genel_sohbet').push({
                    gonderen: user,
                    foto: reader.result,
                    zaman: new Date().toLocaleTimeString()
                });
            }
            reader.readAsDataURL(file);
        }

        function mesajSil(key) {
            if(confirm("Bu mesaj herkesten silinsin mi?")) {
                db.ref('genel_sohbet/' + key).remove();
            }
        }

        function yanitla(kim, ne) {
            replyData = { kim: kim, ne: ne };
            document.getElementById('replyPreview').style.display = 'flex';
            document.getElementById('replyUser').innerText = kim;
            document.getElementById('replyText').innerText = ne;
            document.getElementById('messageInput').focus();
        }

        function yanitIptal() {
            replyData = null;
            document.getElementById('replyPreview').style.display = 'none';
        }

        function cikisYap() {
            localStorage.removeItem('chatUser');
            window.location.href = "index.html";
        }

        db.ref('genel_sohbet').on('value', (snapshot) => {
            var chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            snapshot.forEach((child) => {
                var v = child.val();
                var key = child.key;
                var meClass = (v.gonderen == user) ? "me" : "";
                
                var yanitHtml = v.yanit ? `<div class="replied-part"><b>${v.yanit.kim}</b>: ${v.yanit.ne}</div>` : "";
                var icerik = v.foto ? `<img src="${v.foto}">` : `<span>${v.mesaj}</span>`;
                var silBtn = (v.gonderen == user) ? `<button class="delete-btn" onclick="event.stopPropagation(); mesajSil('${key}')">Sil</button>` : "";

                chatBox.innerHTML += `
                    <div class="msg ${meClass}" onclick="yanitla('${v.gonderen}', '${v.foto ? 'Fotoğraf' : v.mesaj}')">
                        <b>${v.gonderen}</b>
                        ${yanitHtml}
                        ${icerik}
                        ${silBtn}
                    </div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
