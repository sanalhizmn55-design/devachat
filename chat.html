<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deva Chat | Sohbet</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Üst Menü / Profil */
        .header { background: #121212; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #363636; }
        .profile-info { display: flex; align-items: center; gap: 10px; }
        .logout-btn { background: #ed4956; border: none; color: white; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Mesaj Alanı */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #262626; padding: 10px; border-radius: 15px; max-width: 80%; width: fit-content; position: relative; cursor: pointer; }
        .msg.me { align-self: flex-end; background: #005c4b; }
        .msg b { font-size: 12px; color: #aaa; display: block; margin-bottom: 3px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        
        /* Yanıtlanan Mesaj Görünümü */
        .replied-part { background: rgba(0,0,0,0.2); border-left: 3px solid #0095f6; padding: 5px; margin-bottom: 5px; font-size: 12px; border-radius: 4px; }

        /* Yanıt Paneli (Yazı kutusunun üstünde çıkar) */
        #replyPreview { background: #1e1e1e; padding: 10px; display: none; justify-content: space-between; border-left: 5px solid #0095f6; }

        /* Alt Yazma Alanı */
        .input-area { background: #121212; padding: 10px; border-top: 1px solid #363636; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        #messageInput { flex: 1; padding: 12px; background: #000; border: 1px solid #363636; color: white; border-radius: 25px; outline: none; }
        .file-btn { font-size: 24px; cursor: pointer; color: #0095f6; }
        .send-btn { background: #0095f6; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-info">
            <span id="userNameDisplay">Enes Bey</span>
        </div>
        <button class="logout-btn" onclick="cikisYap()">Çıkış Yap</button>
    </div>

    <div id="replyPreview">
        <div>
            <b id="replyUser" style="color:#0095f6"></b>
            <p id="replyText" style="margin:2px 0; font-size:13px;"></p>
        </div>
        <button onclick="yanitIptal()" style="background:none; border:none; color:white; font-size:20px;">×</button>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <div class="input-row">
            <label class="file-btn">
                + <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="fotoGonder()">
            </label>
            <input type="text" id="messageInput" placeholder="Mesaj yazın...">
            <button class="send-btn" onclick="mesajGonder()">Gönder</button>
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDMFqe-lG6-cZUM4XhXs5ftkZt9xZjsno0",
            databaseURL: "https://devachat-fdeb3-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "devachat-fdeb3"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        var user = localStorage.getItem('chatUser') || "Anonim";
        var replyData = null;

        document.getElementById('userNameDisplay').innerText = user;

        function mesajGonder() {
            var msg = document.getElementById('messageInput').value;
            if(msg != "" || replyData) {
                db.ref('genel_sohbet').push({
                    gonderen: user,
                    mesaj: msg,
                    yanit: replyData, // Yanıt bilgisi buraya gider
                    zaman: new Date().toLocaleTimeString()
                });
                document.getElementById('messageInput').value = "";
                yanitIptal();
            }
        }

        function fotoGonder() {
            var file = document.getElementById('imageInput').files[0];
            var reader = new FileReader();
            reader.onloadend = function() {
                db.ref('genel_sohbet').push({
                    gonderen: user,
                    foto: reader.result,
                    zaman: new Date().toLocaleTimeString()
                });
            }
            reader.readAsDataURL(file);
        }

        function yanitla(kim, ne) {
            replyData = { kim: kim, ne: ne };
            document.getElementById('replyPreview').style.display = 'flex';
            document.getElementById('replyUser').innerText = kim;
            document.getElementById('replyText').innerText = ne;
            document.getElementById('messageInput').focus();
        }

        function yanitIptal() {
            replyData = null;
            document.getElementById('replyPreview').style.display = 'none';
        }

        function cikisYap() {
            localStorage.removeItem('chatUser');
            window.location.href = "index.html";
        }

        db.ref('genel_sohbet').on('value', (snapshot) => {
            var chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            snapshot.forEach((child) => {
                var v = child.val();
                var meClass = (v.gonderen == user) ? "me" : "";
                
                var yanitHtml = v.yanit ? `<div class="replied-part"><b>${v.yanit.kim}</b>: ${v.yanit.ne}</div>` : "";
                var icerik = v.foto ? `<img src="${v.foto}">` : v.mesaj;

                chatBox.innerHTML += `
                    <div class="msg ${meClass}" onclick="yanitla('${v.gonderen}', '${v.foto ? 'Fotoğraf' : v.mesaj}')">
                        <b>${v.gonderen}</b>
                        ${yanitHtml}
                        ${icerik}
                    </div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
