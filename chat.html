<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deva Chat</title>
    <style>
        body { background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        header { padding: 15px; border-bottom: 1px solid #262626; text-align: center; font-weight: bold; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 16px; border-radius: 22px; max-width: 70%; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: #3797f0; }
        .received { align-self: flex-start; background: #262626; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .input-bar { padding: 15px; display: flex; align-items: center; gap: 15px; background: #000; border-top: 1px solid #262626; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #363636; background: transparent; color: white; outline: none; }
        .icon-btn { cursor: pointer; font-size: 22px; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <header id="userTitle">Deva Chat</header>
    <div id="chat-window"></div>
    <div class="input-bar">
        <label class="icon-btn">📷<input type="file" id="photoInput" hidden accept="image/*" onchange="uploadImage(this)"></label>
        <span class="icon-btn" id="micBtn">🎤</span>
        <input type="text" id="textInput" placeholder="Mesaj yazın...">
        <span class="icon-btn" onclick="sendText()">🔵</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMFqe-lG6-cZUM4XhXs5ftkZt9xZjsno0",
            authDomain: "devachat-fdeb3.firebaseapp.com",
            projectId: "devachat-fdeb3",
            storageBucket: "devachat-fdeb3.firebasestorage.app",
            messagingSenderId: "29301220392",
            appId: "1:29301220392:web:84c34a88c8bf9817cc411d",
            databaseURL: "https://devachat-fdeb3-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);
        const currentUser = localStorage.getItem('chatUser') || 'Misafir';
        document.getElementById('userTitle').innerText = "Deva Chat - " + currentUser;

        // Mesaj Gönder (Metin)
        window.sendText = function() {
            const txt = document.getElementById('textInput').value;
            if(txt) {
                push(ref(db, 'messages'), { sender: currentUser, text: txt, type: 'text', time: Date.now() });
                document.getElementById('textInput').value = '';
            }
        }

        // Fotoğraf Yükle
        window.uploadImage = function(input) {
            const file = input.files[0];
            if(file) {
                const storageRef = sRef(storage, 'images/' + Date.now() + file.name);
                uploadBytes(storageRef, file).then(snapshot => {
                    getDownloadURL(snapshot.ref).then(url => {
                        push(ref(db, 'messages'), { sender: currentUser, url: url, type: 'image', time: Date.now() });
                    });
                });
            }
        }

        // Mesajları Dinle
        onValue(ref(db, 'messages'), (snapshot) => {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            snapshot.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                div.className = `msg ${m.sender === currentUser ? 'sent' : 'received'}`;
                if(m.type === 'text') div.innerText = m.text;
                else if(m.type === 'image') div.innerHTML = `<img src="${m.url}">`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        });
    </script>
</body>
</html>
