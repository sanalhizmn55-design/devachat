<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deva Chat | Sohbet</title>
    <style>
        body { background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; border-bottom: 1px solid #333; font-weight: bold; text-align: center; font-size: 18px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 14px; word-wrap: break-word; }
        .sent { align-self: flex-end; background: #3797f0; color: white; }
        .received { align-self: flex-start; background: #262626; color: white; }
        .input-bar { padding: 15px; display: flex; align-items: center; gap: 10px; background: #000; border-top: 1px solid #333; }
        .input-bar input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: transparent; color: white; outline: none; }
        .icons { cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <header>Deva Chat</header>
    <div id="chat-window"></div>
    <div class="input-bar">
        <label class="icons">📷<input type="file" id="photoInput" hidden accept="image/*"></label>
        <span class="icons" id="micBtn">🎤</span>
        <input type="text" id="textInput" placeholder="Mesaj yazın...">
        <span class="icons" onclick="sendText()">➡️</span>
    </div>

    <script type="module">
        // Firebase bağlantısı ve Mesajlaşma mantığı buraya gelecek
        // Ses kaydı için MediaRecorder API eklenecek
    </script>
</body>
</html>
