<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deva Chat | Sohbet</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { background: #262626; padding: 10px; margin-bottom: 10px; border-radius: 10px; width: fit-content; max-width: 80%; }
        .input-area { padding: 20px; background: #121212; display: flex; border-top: 1px solid #363636; }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid #363636; color: white; border-radius: 20px; outline: none; }
        button { margin-left: 10px; background: #0095f6; border: none; color: white; font-weight: bold; border-radius: 20px; padding: 0 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Mesaj yazın...">
        <button onclick="mesajGonder()">Gönder</button>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDMFqe-lG6-cZUM4XhXs5ftkZt9xZjsno0",
            databaseURL: "https://devachat-fdeb3-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "devachat-fdeb3"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        var user = localStorage.getItem('chatUser') || "Misafir";

        function mesajGonder() {
            var msg = document.getElementById('messageInput').value;
            if(msg != "") {
                db.ref('genel_sohbet').push({
                    gonderen: user,
                    mesaj: msg,
                    zaman: new Date().toLocaleTimeString()
                });
                document.getElementById('messageInput').value = "";
            }
        }

        db.ref('genel_sohbet').on('value', (snapshot) => {
            var chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            snapshot.forEach((child) => {
                var v = child.val();
                chatBox.innerHTML += `<div class="msg"><b>${v.gonderen}:</b> ${v.mesaj}</div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
